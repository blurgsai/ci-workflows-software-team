# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to YOUR repo as .github/workflows/dev-ci.yml
# It triggers on PRs and pushes to the "dev" branch.
# Runs ALL checks EXCEPT tests (coding standards, design patterns, mock JSON).
# ─────────────────────────────────────────────────────────────────────────────
name: Dev Branch CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  dev-checks:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/dev-ci.yml@main
    secrets: inherit
