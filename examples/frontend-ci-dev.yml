# Frontend CI — dev branch (coding standards + design pattern + mock json, NO tests)
# Plug into frontend repos as .github/workflows/frontend-ci-dev.yml

name: Frontend CI — Dev

on:
  pull_request:
    branches: [dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-dev.yml'

jobs:
  coding-standards:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-coding-standards-check.yml@main
    secrets: inherit

  design-pattern:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-design-pattern-check.yml@main
    with:
      hooks-test-minimum: '50'
    secrets: inherit

  mock-json:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-mock-json-check.yml@main
    secrets: inherit
