# Tileserver CI — dev branch (coding standards + design pattern, NO tests)
# Plug into repos with tileserver/ as .github/workflows/tileserver-ci-dev.yml

name: Tileserver CI — Dev

on:
  pull_request:
    branches: [dev]
    paths:
      - 'tileserver/**'
      - '.github/workflows/tileserver-ci-dev.yml'

jobs:
  coding-standards:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/tileserver-coding-standards-check.yml@main
    secrets: inherit

  design-pattern:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/tileserver-design-pattern-check.yml@main
    secrets: inherit
