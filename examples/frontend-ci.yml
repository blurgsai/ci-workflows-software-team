# Frontend CI — plug this into frontend repos as .github/workflows/frontend-ci.yml
#
# Branch strategy:
#   PR to dev     → coding standards + design pattern + mock json (no tests)
#   PR to staging → tests only (only triggers when test files change)

name: Frontend CI

on:
  pull_request:
    branches:
      - dev
      - staging

jobs:
  # ─── dev: everything except tests ───
  coding-standards:
    if: github.base_ref == 'dev'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-coding-standards-check.yml@main
    secrets: inherit

  design-pattern:
    if: github.base_ref == 'dev'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-design-pattern-check.yml@main
    with:
      hooks-test-minimum: '50'
    secrets: inherit

  mock-json:
    if: github.base_ref == 'dev'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-mock-json-check.yml@main
    secrets: inherit

  # ─── staging: only tests, only when test files change ───
  tests:
    if: github.base_ref == 'staging'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-test-check.yml@main
    with:
      min-integration-tests: '10'
    secrets: inherit
