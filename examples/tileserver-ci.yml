# Tileserver CI — plug this into repos with a tileserver/ as .github/workflows/tileserver-ci.yml
#
# Branch strategy:
#   PR to dev     → coding standards + design pattern (no tests)
#   PR to staging → tests only (only triggers when test files change)

name: Tileserver CI

on:
  pull_request:
    branches:
      - dev
      - staging

jobs:
  # ─── dev: everything except tests ───
  coding-standards:
    if: github.base_ref == 'dev'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/tileserver-coding-standards-check.yml@main
    secrets: inherit

  design-pattern:
    if: github.base_ref == 'dev'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/tileserver-design-pattern-check.yml@main
    secrets: inherit

  # ─── staging: only tests, only when test files change ───
  # Note: tileserver uses the backend-test-check workflow with tileserver-dir override
  tests:
    if: github.base_ref == 'staging'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/backend-test-check.yml@main
    with:
      backend-dir: 'tileserver'
      min-integration-tests: '5'
    secrets: inherit
