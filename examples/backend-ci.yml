# Backend CI — plug this into backend repos as .github/workflows/backend-ci.yml
#
# Branch strategy:
#   PR to dev     → coding standards + design pattern (no tests)
#   PR to staging → tests only (only triggers when tests/ files change)

name: Backend CI

on:
  pull_request:
    branches:
      - dev
      - staging

jobs:
  # ─── dev: everything except tests ───
  coding-standards:
    if: github.base_ref == 'dev'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/backend-coding-standards-check.yml@main
    secrets: inherit

  design-pattern:
    if: github.base_ref == 'dev'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/backend-design-pattern-check.yml@main
    secrets: inherit

  # ─── staging: only tests, only when test files change ───
  tests:
    if: github.base_ref == 'staging'
    uses: blurgsai/ci-workflows-software-team/.github/workflows/backend-test-check.yml@main
    with:
      min-integration-tests: '5'
    secrets: inherit
