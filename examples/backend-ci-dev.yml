# Backend CI — dev branch (coding standards + design pattern, NO tests)
# Plug into backend repos as .github/workflows/backend-ci-dev.yml

name: Backend CI — Dev

on:
  pull_request:
    branches: [dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-dev.yml'

jobs:
  coding-standards:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/backend-coding-standards-check.yml@main
    secrets: inherit

  design-pattern:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/backend-design-pattern-check.yml@main
    secrets: inherit
