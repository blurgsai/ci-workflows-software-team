# Frontend CI — staging branch (tests ONLY, only when test files change)
# Plug into frontend repos as .github/workflows/frontend-ci-staging.yml
#
# Trigger: PR to staging, only when test files change
# Source code changes (frontend/src/ excluding test files) do NOT trigger this workflow.

name: Frontend CI — Staging

on:
  pull_request:
    branches: [staging]
    paths:
      - 'frontend/src/**/__tests__/**'
      - 'frontend/src/**/*.test.*'
      - 'frontend/src/**/*.spec.*'
      - 'frontend/src/**/*.integration.test.*'
      - '.github/workflows/frontend-ci-staging.yml'

jobs:
  tests:
    uses: blurgsai/ci-workflows-software-team/.github/workflows/frontend-test-check.yml@main
    with:
      min-integration-tests: '10'
    secrets: inherit
