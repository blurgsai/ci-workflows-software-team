name: Backend Design Pattern Check

on:
  workflow_call:
    inputs:
      backend-dir:
        description: 'Path to the backend directory relative to repo root'
        required: false
        default: 'backend'
        type: string
      python-version:
        description: 'Python version to use'
        required: false
        default: '3.12'
        type: string
      ref:
        description: 'Branch/ref of the shared-ci repo to use'
        required: false
        default: 'main'
        type: string

jobs:
  backend-design-pattern:
    name: FastAPI Architecture & Design Pattern Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.backend-dir }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout shared CI repo
        uses: actions/checkout@v4
        with:
          repository: blurgsai/ci-workflows-software-team
          ref: ${{ inputs.ref }}
          path: shared-ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.backend-dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Check 0: All code must be under src/ (no legacy structures) ───
      - name: Enforce src/ structure (no routes/, utils/, or loose .py files)
        run: |
          chmod +x ../shared-ci/scripts/backend/check-backend-src-enforcement.sh
          ../shared-ci/scripts/backend/check-backend-src-enforcement.sh .

      # ─── Check 1: Feature Folder Structure ───
      - name: Validate backend feature folder structure
        run: |
          chmod +x ../shared-ci/scripts/backend/validate-backend-feature-structure.sh
          ../shared-ci/scripts/backend/validate-backend-feature-structure.sh src/features

      # ─── Check 2: No Nested Feature Folders ───
      - name: Check for nested feature folders
        run: |
          chmod +x ../shared-ci/scripts/backend/check-backend-no-nested-features.sh
          ../shared-ci/scripts/backend/check-backend-no-nested-features.sh src/features

      # ─── Check 3: No Top-Level Technical Role Folders ───
      - name: Check no top-level /models, /routes, /schemas folders
        run: |
          chmod +x ../shared-ci/scripts/backend/check-backend-no-top-level-tech-folders.sh
          ../shared-ci/scripts/backend/check-backend-no-top-level-tech-folders.sh src

      # ─── Check 4: Layer Import Rules ───
      - name: Check layer import rules (router no raw schemas, one-directional flow)
        run: |
          chmod +x ../shared-ci/scripts/backend/check-backend-layer-imports.sh
          ../shared-ci/scripts/backend/check-backend-layer-imports.sh src/features

      # ─── Check 5: Barrel export Rules (__init__.py) ───
      - name: Check barrel exports (no raw schemas or mappers exported)
        run: |
          chmod +x ../shared-ci/scripts/backend/check-backend-barrel-exports.sh
          ../shared-ci/scripts/backend/check-backend-barrel-exports.sh src/features

      # ─── Check 6: Services Must Not Import FastAPI ───
      - name: Check services are independent of FastAPI
        run: |
          chmod +x ../shared-ci/scripts/backend/check-backend-services-no-fastapi.sh
          ../shared-ci/scripts/backend/check-backend-services-no-fastapi.sh src/features

      # ─── Check 7: Router Rules (domain models only, delegates to services) ───
      - name: Check router rules (response_model=DomainModel, delegates to services)
        run: |
          chmod +x ../shared-ci/scripts/backend/check-backend-router-rules.sh
          ../shared-ci/scripts/backend/check-backend-router-rules.sh src/features

      # ─── Check 8: Import Linter (Python dependency boundaries) ───
      - name: Run import-linter boundary checks
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            lint-imports
          else
            echo "SKIP: No Python source files in src/ — skipping import-linter"
          fi

      # ─── Check 9: Ruff Linter ───
      - name: Run ruff linter
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            ruff check src/
          else
            echo "SKIP: No Python source files in src/ — skipping ruff"
          fi
