name: Frontend Test Check

on:
  workflow_call:
    inputs:
      frontend-dir:
        description: 'Path to the frontend directory relative to repo root'
        required: false
        default: 'frontend'
        type: string
      node-version:
        description: 'Node.js version to use'
        required: false
        default: '20'
        type: string
      min-integration-tests:
        description: 'Minimum integration test cases per file'
        required: false
        default: '10'
        type: string
      ref:
        description: 'Branch/ref of the shared-ci repo to use'
        required: false
        default: 'main'
        type: string

jobs:
  frontend-tests:
    name: Frontend Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.frontend-dir }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Check if frontend directory exists
        id: check-dir
        run: |
          if [ -d "${{ inputs.frontend-dir }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "SKIP: ${{ inputs.frontend-dir }} directory does not exist"
          fi

      - name: Checkout shared CI repo
        if: steps.check-dir.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          repository: blurgsai/ci-workflows-software-team
          ref: ${{ inputs.ref }}
          path: shared-ci

      - name: Setup Node.js
        if: steps.check-dir.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.frontend-dir }}/package-lock.json

      - name: Install dependencies
        if: steps.check-dir.outputs.exists == 'true'
        run: npm ci

      # ─── Check 1: Integration Test Coverage ───
      - name: Check integration test coverage (every UI feature has integration tests)
        if: steps.check-dir.outputs.exists == 'true'
        run: |
          chmod +x ../shared-ci/scripts/frontend/check-frontend-integration-test-coverage.sh
          ../shared-ci/scripts/frontend/check-frontend-integration-test-coverage.sh src/features

      # ─── Check 2: Integration Test Minimum ───
      - name: Check integration test minimum (each integration file has >= ${{ inputs.min-integration-tests }} tests)
        if: steps.check-dir.outputs.exists == 'true'
        run: |
          chmod +x ../shared-ci/scripts/frontend/check-frontend-integration-test-minimum.sh
          ../shared-ci/scripts/frontend/check-frontend-integration-test-minimum.sh src/features ${{ inputs.min-integration-tests }}

      # ─── Check 3: Run All Tests (unit + integration) ───
      - name: Run all tests
        if: steps.check-dir.outputs.exists == 'true'
        run: npx vitest run --reporter=verbose
