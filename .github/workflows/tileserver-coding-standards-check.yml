name: Tileserver Coding Standards Check

on:
  workflow_call:
    inputs:
      tileserver-dir:
        description: 'Path to the tileserver directory relative to repo root'
        required: false
        default: 'tileserver'
        type: string
      python-version:
        description: 'Python version to use'
        required: false
        default: '3.12'
        type: string
      ref:
        description: 'Branch/ref of the shared-ci repo to use'
        required: false
        default: 'main'
        type: string

jobs:
  tileserver-coding-standards:
    name: Tileserver Naming & Coding Standards Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.tileserver-dir }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout shared CI repo
        uses: actions/checkout@v4
        with:
          repository: blurgsai/ci-workflows-software-team
          ref: ${{ inputs.ref }}
          path: shared-ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.tileserver-dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Check 1: Naming Conventions ───
      - name: Check naming conventions (files, functions, classes, variables)
        run: |
          chmod +x ../shared-ci/scripts/tileserver/check-tileserver-naming-conventions.sh
          ../shared-ci/scripts/tileserver/check-tileserver-naming-conventions.sh src

      # ─── Check 2: Ruff Linter ───
      - name: Run ruff linter
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            pip install ruff
            ruff check src/
          else
            echo "SKIP: No Python source files in src/ -- skipping ruff"
          fi
